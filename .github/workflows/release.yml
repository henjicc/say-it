name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        run: npm run tauri:build

      - name: publish github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $bundleDir = Join-Path $PWD "src-tauri/target/release/bundle/nsis"
          $installers = @(Get-ChildItem -LiteralPath $bundleDir -Filter "*.exe")

          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer in $bundleDir, found $($installers.Count)."
          }

          $installerName = "SayIt_${version}_x64-setup.exe"
          $installerPath = Join-Path $bundleDir $installerName
          Rename-Item -LiteralPath $installers[0].FullName -NewName $installerName

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $changelogPath = Join-Path $PWD "CHANGELOG.md"

          if (-not (Test-Path -LiteralPath $changelogPath)) {
            throw "CHANGELOG.md not found."
          }

          $changelog = Get-Content -LiteralPath $changelogPath -Raw -Encoding utf8
          $escapedVersion = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escapedVersion\].*?(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)

          if (-not $match.Success) {
            throw "Release notes for version $version were not found in CHANGELOG.md."
          }

          $match.Value.Trim() | Set-Content -LiteralPath $notesPath -Encoding utf8

          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete "${{ github.ref_name }}" --yes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete existing release ${{ github.ref_name }}."
            }
          }

          gh release create "${{ github.ref_name }}" $installerPath `
            --title "说吧！ v$version" `
            --notes-file $notesPath `
            --latest
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create release ${{ github.ref_name }}."
          }
